spring:
  application:
    name: entrelazados-asistencia
  datasource:
    # Preferir variables estándar de Spring en producción (Render)
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/entrelazados_asistencia}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:kepler2607}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

server:
  port: ${PORT:8081}
  servlet:
    context-path: /api/v1

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

app:
  jwt:
    secret: ${APP_JWT_SECRET:entrelazados2026SecretKeyForJWTSigningMustBe64CharsLongForHS256Algorithm!}
    expirationMs: ${APP_JWT_EXPIRATIONMS:86400000}
  cors:
    allowedOrigins: ${APP_CORS_ALLOWEDORIGINS:http://localhost:5173,http://localhost:5174}

hikvision:
  ip: ${HIKVISION_IP:192.168.68.85}
  username: ${HIKVISION_USER:admin}
  password: ${HIKVISION_PASS:Entrelazados2026}
  attendanceCheckOnly: ${HIKVISION_ATTENDANCE_CHECK_ONLY:true}
